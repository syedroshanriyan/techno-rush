<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techno Rush</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { overflow-x:hidden; }

/* ENTRY */
.page-enter{animation:blurIn 1.2s ease-out forwards;}
@keyframes blurIn{
0%{opacity:0;transform:scale(1.1);filter:blur(20px)}
100%{opacity:1;transform:scale(1);filter:blur(0)}
}

/* SCROLL */
.card-hidden{opacity:0;transform:translateY(60px)}
.card-show{opacity:1;transform:translateY(0);transition:all .8s cubic-bezier(.23,1,.32,1)}

/* TILT */
.tilt{transform-style:preserve-3d;transition:.2s}

/* PARALLAX */
.parallax{transform:translateY(var(--scrollY));transition:transform .1s}

/* SHIMMER */
.shimmer{
  background-size:200% auto;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{
  0%{background-position:-200% center;}
  100%{background-position:200% center;}
}

/* GOLD */
.gold{
  background:linear-gradient(120deg,#FFD700,#fff6b7,#FFD700,#ffcc00,#FFD700);
  -webkit-background-clip:text;
  color:transparent;
}

/* SILVER */
.silver{
  background:linear-gradient(120deg,#cfcfcf,#ffffff,#c0c0c0,#ffffff,#a8a8a8);
  -webkit-background-clip:text;
  color:transparent;
}

/* VIDEO */
#introVideo{
 position:fixed;
 inset:0;
 z-index:9999;
 background:black;
 display:flex;
 align-items:center;
 justify-content:center;
}
#introVideo video{
 width:100%;
 height:100%;
 object-fit:cover;
}

/* 🔥 POSTER MODAL */
#posterModal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.85);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:999;
}

#posterModal img{
 max-width:90%;
 max-height:90%;
 border-radius:16px;
 animation:zoomIn .3s ease;
}

@keyframes zoomIn{
 from{transform:scale(0.7);opacity:0}
 to{transform:scale(1);opacity:1}
}
</style>
</head>

<body class="bg-black text-white">

<!-- VIDEO -->
<div id="introVideo">
  <video autoplay muted playsinline id="videoPlayer">
    <source src="intro.mp4" type="video/mp4">
  </video>
</div>

<!-- POSTER MODAL -->
<div id="posterModal" onclick="closePoster()">
  <img id="posterImage">
</div>

<!-- BACKGROUND -->
<div class="fixed inset-0 -z-10 parallax">
<div class="absolute w-[60vw] h-[60vw] max-w-[500px] bg-blue-500 rounded-full blur-[150px] opacity-30 top-[-10%] left-[-10%]"></div>
<div class="absolute w-[50vw] h-[50vw] max-w-[400px] bg-pink-500 rounded-full blur-[150px] opacity-30 bottom-[-10%] right-[-10%]"></div>
</div>

<div class="px-4 sm:px-6 py-8 page-enter">

<!-- HERO -->
<div class="text-center mb-16 space-y-3">
<h2 class="font-extrabold tracking-widest gold shimmer text-2xl sm:text-3xl md:text-5xl lg:text-6xl">DR.TTIT</h2>
<p class="italic font-semibold text-base sm:text-lg md:text-xl bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-transparent bg-clip-text">PRESENTS</p>
<h1 class="font-extrabold tracking-wide silver shimmer drop-shadow-xl text-4xl sm:text-6xl md:text-7xl lg:text-8xl leading-tight">TECHNO RUSH</h1>
</div>

<!-- FILTER -->
<div class="flex flex-wrap justify-center gap-3 sm:gap-4 mb-10">
<button onclick="filterEvents('All')" class="px-4 sm:px-5 py-2 rounded-full border border-white/20 backdrop-blur-xl text-sm sm:text-base">All</button>
<button onclick="filterEvents('Technical')" class="px-4 sm:px-5 py-2 rounded-full border border-white/20 backdrop-blur-xl text-sm sm:text-base">Technical</button>
<button onclick="filterEvents('Non-Technical')" class="px-4 sm:px-5 py-2 rounded-full border border-white/20 backdrop-blur-xl text-sm sm:text-base">Non-Technical</button>
</div>

<div id="eventsContainer" class="grid gap-6 sm:gap-8 md:grid-cols-2 lg:grid-cols-3"></div>

</div>

<script>
const events=[
{title:"Circuit Design",category:"Technical",time:"10:30 AM - 11:30 AM",location:"ECE Lab",date:"25 April 2026",poster:"posters/circuit.jpeg",link:"https://docs.google.com/forms/d/e/1FAIpQLScb4KNecfLLORRUSSYYZqLMDJnBdqF28EGczQa0A9fdWSKC4Q/viewform?usp=publish-editor"},
{title:"Code Debugging",category:"Technical",time:"11:30 AM - 12:30 PM",location:"CSE Lab 1 & 2",date:"25 April 2026",poster:"posters/code.jpeg",link:"https://docs.google.com/forms/d/1A_HH0H4A-EtKjUWDeFCaVciNjnKhlB9xJS-gKQW7c_U/edit"},
{title:"Solid Modelling",category:"Technical",time:"11:30 AM - 12:30 PM",location:"CAED Lab",date:"25 April 2026",poster:"posters/solid.jpeg",link:"#"},
{title:"Prompt Battle",category:"Technical",time:"01:30 PM - 02:30 PM",location:"CSE Lab 3",date:"25 April 2026",poster:"posters/prompt.jpeg",link:"https://forms.gle/T4DW7t4Uyibig32AA"},
{title:"Web Design",category:"Technical",time:"01:30 PM - 02:30 PM",location:"CSE Lab 4 & 5",date:"25 April 2026",poster:"posters/web.jpeg",link:"https://share.google/QqN7HGJeUDIi5aBQx"},
{title:"Poster Design",category:"Non-Technical",time:"11:30 AM - 12:30 PM",location:"Mechanical Seminar Hall",date:"25 April 2026",poster:"posters/poster.jpeg",link:"https://forms.gle/2RP3i7nYam6nkVDr6"},
{title:"Tech Extempore",category:"Non-Technical",time:"01:30 PM - 02:30 PM",location:"Students Centre",date:"25 April 2026",poster:"posters/extempore.jpeg",link:"https://forms.gle/cmLehuyd282fmStr5"},
{title:"Debate",category:"Non-Technical",time:"02:30 PM - 03:30 PM",location:"Students Centre",date:"25 April 2026",poster:"posters/debate.jpeg",link:"#"},
{title:"Quiz",category:"Non-Technical",time:"02:30 PM - 03:00 PM",location:"Mechanical Seminar Hall",date:"25 April 2026",poster:"posters/quiz.jpeg",link:"https://forms.gle/ALJ6WDTGmyPWoMpV6"}
];

function renderEvents(list){
const c=document.getElementById("eventsContainer");
c.innerHTML="";

list.forEach(e=>{
const d=document.createElement("div");
d.className="card-hidden tilt rounded-2xl overflow-hidden bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg cursor-pointer";

d.innerHTML=`
<img src="${e.poster}" class="h-40 sm:h-44 w-full object-cover">
<div class="p-4 sm:p-5">
<h2 class="text-lg sm:text-xl font-semibold">${e.title}</h2>
<p class="text-sm text-gray-300">📅 ${e.date}</p>
<p class="text-sm text-gray-300">⏰ ${e.time}</p>
<p class="text-sm text-gray-300">📍 ${e.location}</p>

<a href="${e.link}" target="_blank"
onclick="event.stopPropagation()"
class="mt-3 block text-center w-full py-2 bg-gradient-to-r from-blue-500 to-pink-500 rounded-xl text-sm sm:text-base">
Register
</a>
</div>`;

d.onclick=()=>openPoster(e.poster);

c.appendChild(d);
});

observe(); tilt();
}

/* 🔥 OPEN POSTER */
function openPoster(src){
document.getElementById("posterImage").src=src;
document.getElementById("posterModal").style.display="flex";
}

/* CLOSE */
function closePoster(){
document.getElementById("posterModal").style.display="none";
}

function filterEvents(cat){
if(cat==="All") renderEvents(events);
else renderEvents(events.filter(e=>e.category===cat));
}

function observe(){
const cards=document.querySelectorAll(".card-hidden");
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){e.target.classList.add("card-show")}
});
},{threshold:0.2});
cards.forEach(c=>obs.observe(c));
}

function tilt(){
document.querySelectorAll(".tilt").forEach(card=>{
card.addEventListener("mousemove",e=>{
const r=card.getBoundingClientRect();
const x=e.clientX-r.left;
const y=e.clientY-r.top;
card.style.transform=`rotateX(${(y-r.height/2)/25}deg) rotateY(${-(x-r.width/2)/25}deg)`;
});
card.addEventListener("mouseleave",()=>card.style.transform="rotateX(0) rotateY(0)");
});
}

window.addEventListener("scroll",()=>{
document.documentElement.style.setProperty("--scrollY",window.scrollY * -0.2 + "px");
});

const video=document.getElementById("videoPlayer");
video.onended=()=>{document.getElementById("introVideo").style.display="none";};

setTimeout(()=>{
document.getElementById("introVideo").style.display="none";
},6000);

renderEvents(events);
</script>

</body>
</html>
